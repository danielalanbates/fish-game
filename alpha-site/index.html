<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Game - Alpha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
            color: #fff;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-block;
            background: rgba(255, 165, 0, 0.2);
            border: 1px solid #ffa500;
            color: #ffa500;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .features {
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        .features h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #00d9ff;
        }
        .features ul {
            list-style: none;
        }
        .features li {
            padding: 8px 0;
            color: #d0d0d0;
        }
        .features li:before {
            content: "✓ ";
            color: #00ff88;
            font-weight: bold;
        }
        .cta-button {
            display: inline-block;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            padding: 16px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .cta-button:hover {
            transform: scale(1.05);
        }
        .footer {
            margin-top: 3rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fish Game</h1>
        <p class="subtitle">Interactive Fishing Simulation Game</p>

        <span class="badge">🚀 Alpha Release</span>

        <div class="features">
            <h2>Features</h2>
            <ul>
                <li>Realistic fishing mechanics</li>
                <li>Multiple fish species</li>
                <li>Beautiful aquatic environments</li>
                <li>Progressive difficulty</li>
                <li>Achievement system</li>
            </ul>
        </div>

        <a href="https://github.com/danielalanbates/fish-game" class="cta-button">
            View on GitHub
        </a>

        <p class="footer">
            © 2026 Fish Game. All rights reserved.<br>
            Built with Swift • SwiftUI
        </p>
    </div>
</body>
</html>
